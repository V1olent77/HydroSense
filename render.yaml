# Render blueprint. Deploy with: render.com → New → Blueprint → connect repo.
#
# Free tier limits we work around:
#   - no persistent disks       → SQLite lives on ephemeral filesystem
#   - no pre-deploy commands    → init + seed inlined into startCommand
#
# Consequence: every cold start regenerates the DB from schema + seed
# script (both are idempotent and fast — ~1 sec). Real ESP32 readings
# pushed during a session WILL be wiped after ~15 min of sleep. For a
# demo / MVP this is fine. To persist real data, upgrade to a paid plan
# and re-add the `disk:` block, or migrate to Postgres (free 90 days
# on Render).
services:
  - type: web
    name: hydrosense-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python db/init_db.py && python scripts/seed_demo_data.py && gunicorn api:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ALLOWED_ORIGINS
        # Update this to your Vercel URL after the frontend deploys.
        value: "*"
